<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#010409" />
<title>Sky — Nearest Flight</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="theme.css" />
<style>
  :root{
    --bg:#010409; --amber:#7db8ff; --amber-dim:#4a7fc4; --muted:#35567e; --faint:#16263c;
    --city:#dcebff; --glow:#123c78; --good:#5ad1a0; --late:#ff6b5a;
    --panel:#0d1728; --panel2:#0a1220; --btn-text:#06121f;
  }
  /* Black/Day are picked in Settings alongside the existing accent-color swatches
     (same three-way Dark/Black/Day choice as the two boards). Day trades the
     accent-derived night-sky palette for a fixed light one -- the picked accent
     hex still tints buttons/borders, but structural text/bg stay fixed so they
     stay readable on a light background; see setTheme()'s "day" branch. */
  :root[data-theme="day"]{
    --bg:#eef1f8; --amber:#1c3a63; --amber-dim:#3d5a82; --muted:#5b6478; --faint:#c7ccd9;
    --city:#161b2e; --glow:#c7d6f2; --good:#1f8f5f; --late:#c23b2b;
    --panel:#ffffff; --panel2:#f3f5fb; --btn-text:#ffffff;
  }
  :root[data-theme="day"] #sky{display:none}
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--amber);
    -webkit-font-smoothing:antialiased; overflow:hidden;
    display:flex; flex-direction:column; height:100dvh;
    letter-spacing:.5px;
  }
  /* top bar */
  header{display:flex; align-items:center; gap:14px; padding:3.2vmin 4vw 0}
  header .tag{font-size:clamp(.8rem,2.1vw,1.5rem); color:var(--amber-dim); font-weight:700;
    text-transform:uppercase; letter-spacing:.35em}
  header .clock{margin-left:auto; font-size:clamp(1rem,2.6vw,2rem); color:var(--muted);
    font-variant-numeric:tabular-nums}
  header a, header button{color:var(--muted); text-decoration:none; font-size:clamp(.9rem,2.2vw,1.4rem);
    border:1px solid var(--faint); border-radius:10px; padding:.4em .7em; background:none;
    cursor:pointer; display:inline-flex; align-items:center; font-family:inherit}
  header a:hover, header button:hover{color:var(--amber-dim); border-color:var(--amber-dim)}

  main{flex:1; display:flex; flex-direction:column; justify-content:center; gap:1.2vmin;
    padding:1.4vmin 5vw; min-height:0; overflow:hidden}

  /* sizes are height-aware (min of vw and vh) so the page always fits the screen */
  .dist{font-size:clamp(.8rem,min(2.4vw,2.5vh),1.6rem); color:var(--amber-dim); font-weight:600}
  .airline{font-size:clamp(1.7rem,min(7.4vw,8.8vh),5.4rem); font-weight:800; line-height:1; color:var(--amber)}
  .flight{font-size:clamp(1rem,min(3.1vw,3.5vh),2.3rem); color:var(--amber-dim); font-weight:700; margin-top:.15em}

  .route{display:flex; align-items:baseline; gap:2.5vw; flex-wrap:wrap; margin-top:.5vmin}
  .route .city{font-size:clamp(1.4rem,min(6.4vw,7.8vh),4.9rem); font-weight:800; line-height:1; color:var(--city)}
  .route .code{font-size:clamp(1rem,2.6vw,2.4rem); color:var(--muted); font-weight:700}
  .route .arrow{font-size:clamp(1.3rem,min(5vw,6vh),3.8rem); color:var(--amber-dim); font-weight:400}
  .subcity{font-size:clamp(.78rem,min(2.1vw,2.4vh),1.45rem); color:var(--muted); font-weight:600; margin-top:.3em}

  .status{display:flex; align-items:center; gap:1em; flex-wrap:wrap; margin-top:1vmin;
    font-size:clamp(1rem,min(3vw,3.3vh),2.2rem); font-weight:800}
  .status .phase{color:var(--amber)}
  .status .alt{color:var(--amber-dim); font-weight:700}
  .status .badge{padding:.12em .5em; border-radius:.3em; font-weight:800}
  .status .badge.ok{background:rgba(90,209,122,.14); color:var(--good)}
  .status .badge.late{background:rgba(255,107,90,.15); color:var(--late)}
  .status .badge.na{color:var(--muted); border:1px solid var(--faint)}
  /* emergency squawk (7500/7600/7700) or an ADS-B emergency flag -- rare, so
     make it impossible to miss: red, bordered, gently pulsing. */
  .status .badge.emerg{background:rgba(255,60,45,.18); color:#ff6b5a;
    border:1px solid rgba(255,90,80,.55); animation:emergPulse 1.1s ease-in-out infinite}
  @keyframes emergPulse{0%,100%{opacity:1}50%{opacity:.4}}
  /* a rotating arrow shows the vehicle's actual heading (track over ground);
     inline-block so the per-frame transform:rotate() actually applies. */
  .status .hdg-arrow{display:inline-block; font-weight:900; line-height:1}
  .status .vr-arm{font-weight:900}

  /* ---- journey progress: how far along its route the vehicle is, drawn as a
     slim bar with a glowing marker at the live position + flown/to-go labels.
     Shown for planes and Amtrak (anything with known origin+destination). ---- */
  .progress{margin-top:1.3vmin; display:none}
  .progress .bar{position:relative; height:6px; border-radius:99px; background:var(--faint)}
  .progress .fill{position:absolute; left:0; top:0; bottom:0; border-radius:99px;
    background:linear-gradient(90deg,var(--amber-dim),var(--amber)); transition:width 1s ease}
  .progress .dot{position:absolute; top:50%; width:13px; height:13px; margin-left:-6.5px;
    border-radius:50%; background:var(--amber); transform:translateY(-50%);
    box-shadow:0 0 0 3px var(--bg),0 0 10px 2px var(--glow); transition:left 1s ease}
  .progress .lbl{display:flex; justify-content:space-between; gap:1em; margin-top:.6em;
    font-size:clamp(.7rem,min(1.9vw,2.1vh),1.15rem); color:var(--muted); font-weight:600;
    font-variant-numeric:tabular-nums}
  .progress .lbl .pct{color:var(--amber-dim); font-weight:800}

  .empty{font-size:clamp(2rem,7vw,6rem); font-weight:800; color:var(--amber-dim); text-align:center}

  #fsHint{position:fixed; top:0; left:50%; transform:translate(-50%,-120%); z-index:80;
    background:var(--panel); color:var(--city); border:1px solid var(--faint); border-radius:0 0 12px 12px;
    padding:12px 20px; font-size:14px; max-width:90vw; text-align:center; transition:transform .35s ease;
    box-shadow:0 10px 30px rgba(0,0,0,.5)}
  #fsHint.show{transform:translate(-50%,0)}

  /* ---- animated night sky background ---- */
  #sky{position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none}
  /* Real sunrise/sunset: a horizon-to-zenith gradient recolored from the sun's
     actual elevation at this location (see sunElevationDeg/updateSunSky), sitting
     UNDER the existing glow blobs + stars so twilight/dawn/dusk tint the whole
     sky instead of replacing it. opacity is driven per-frame by JS; only opacity
     transitions (gradients themselves can't be CSS-transitioned) but updates are
     60s apart so the color step is always small enough to look smooth. */
  #sunSky{position:absolute; inset:0; transition:opacity 4s ease}
  #sky .glow{position:absolute; border-radius:50%; filter:blur(70px); opacity:.28;
    animation:drift 30s ease-in-out infinite alternate}
  #sky .g1{width:60vmax;height:60vmax; left:-18vmax; top:-24vmax; background:radial-gradient(circle,var(--glow),transparent 65%)}
  #sky .g2{width:48vmax;height:48vmax; right:-14vmax; bottom:-18vmax; background:radial-gradient(circle,var(--glow),transparent 65%); animation-delay:-11s; opacity:.2}
  #sky .g3{width:32vmax;height:32vmax; left:38vw; top:58vh; background:radial-gradient(circle,var(--glow),transparent 60%); animation-delay:-20s; opacity:.16}
  @keyframes drift{from{transform:translate3d(0,0,0) scale(1)}to{transform:translate3d(6vmax,3vmax,0) scale(1.12)}}
  .star{position:absolute; border-radius:50%; background:var(--city);
    animation:twinkle var(--tw,4s) ease-in-out var(--td,0s) infinite}
  @keyframes twinkle{0%,100%{opacity:.12}50%{opacity:.85}}

  /* ---- flight-change transition ---- */
  #flight.swap{animation:swapIn .8s cubic-bezier(.2,.7,.2,1)}
  @keyframes swapIn{
    from{opacity:0; transform:translateY(30px) scale(.98); filter:blur(8px)}
    to{opacity:1; transform:none; filter:none}
  }

  /* ---- mini live map (real position, not just an abstract progress bar) ----
     Lives in the .side column next to the photo, not stretched full-width
     under the text, so it gets a sane (close to square) shape instead of a
     thin wide letterbox. */
  #miniMap{width:100%; min-height:0; border-radius:1.4vmin; border:1px solid var(--faint);
    display:none; overflow:hidden}
  #miniMap .leaflet-container{background:var(--panel2)}
  .mini-veh-icon svg{overflow:visible; filter:drop-shadow(0 0 6px rgba(120,180,255,.9))}
  .mini-veh-icon path, .mini-veh-icon rect{fill:#bcd9ff}
  .mini-veh-icon{transition:transform 1.4s linear}
  .mini-endpt{width:9px; height:9px; border-radius:50%; background:var(--muted); border:2px solid var(--panel2)}

  /* ---- settings panel ---- */
  #settings{position:fixed; inset:0; background:rgba(1,4,9,.72); backdrop-filter:blur(8px);
    display:none; align-items:center; justify-content:center; z-index:50; padding:20px}
  #settings.show{display:flex}
  #settings .panel{background:var(--panel2); border:1px solid var(--faint); border-radius:18px;
    padding:26px; max-width:460px; width:100%; box-shadow:0 20px 80px rgba(0,0,0,.6)}
  #settings h3{color:var(--amber); font-size:20px; margin-bottom:4px}
  #settings .lbl{color:var(--muted); font-size:13px; font-weight:700; text-transform:uppercase;
    letter-spacing:.15em; margin:20px 0 9px}
  .seg{display:flex; gap:8px}
  .seg button{flex:1; padding:14px 6px; border-radius:12px; border:1px solid var(--faint);
    background:var(--panel); color:var(--muted); font-size:15px; font-weight:700; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:4px; font-family:inherit}
  .seg button .ic{font-size:22px}
  .seg button.active{border-color:var(--amber); color:var(--amber); background:rgba(125,184,255,.08)}
  .swatches{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .sw{width:34px; height:34px; border-radius:50%; border:2px solid transparent; cursor:pointer;
    padding:0; outline:none}
  .sw.active{border-color:#fff; box-shadow:0 0 0 2px rgba(255,255,255,.25)}
  .sw.custom{background:conic-gradient(#ff5a5a,#ffd23f,#5ad17a,#4aa8ff,#b388ff,#ff5a5a);
    position:relative; overflow:hidden}
  .sw.custom input{position:absolute; inset:-6px; opacity:0; cursor:pointer}
  #settings .done{margin-top:24px; width:100%; padding:13px; border-radius:12px; border:none;
    background:var(--amber); color:var(--btn-text); font-weight:800; font-size:15px; cursor:pointer; font-family:inherit}

  #flight{display:grid; grid-template-columns:1.5fr 1fr; gap:4vw; align-items:center;
    min-height:0; max-height:100%; width:100%}
  #flight .txt{min-width:0}
  /* .side stacks the photo + mini-map, splitting a shared height budget so
     the map gets a roughly square shape instead of a thin full-width strip. */
  .side{margin:0; min-width:0; min-height:0; height:min(50vh,100%); display:flex; flex-direction:column; gap:1.6vmin}
  .photo{margin:0; min-width:0; min-height:0; flex:1.15; display:flex; flex-direction:column}
  .photo img{width:100%; height:100%; min-height:0; object-fit:cover; border-radius:1.6vmin;
    border:1px solid var(--faint); box-shadow:0 8px 40px rgba(60,130,255,.12); display:block; flex:1}
  .photo figcaption{margin-top:.4em; text-align:right; flex-shrink:0}
  .photo a{color:var(--muted); font-size:clamp(.7rem,1.6vw,1rem); text-decoration:none}
  #miniMap{flex:1}
  @media (max-width:760px), (orientation:portrait){
    #flight{grid-template-columns:1fr; gap:2vmin}
    .side{height:auto; flex-direction:row}
    .photo{flex:1.15; max-height:26vh}
    #miniMap{flex:1; max-height:26vh}
  }

  footer{padding:2vmin 5vw 3vmin; color:var(--faint); font-size:clamp(.8rem,2vw,1.2rem);
    display:flex; gap:1.5em}
  footer b{color:var(--muted)}
  .pulse{animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.72}}
</style>
</head>
<body>
  <div id="sky">
    <div id="sunSky"></div>
    <div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>
    <div id="stars"></div>
  </div>
  <header>
    <span class="tag" id="tag">✈ Nearest flight</span>
    <span class="clock" id="clock">—</span>
    <button id="setBtn" title="Customize">⚙</button>
    <button id="fsBtn" title="Full screen (F)"></button>
    <a id="tourBtn" href="tour.html" title="Grand Tour — shuffle every city on one live map" onclick="window.location.href=this.href; return false;">tour ›</a>
    <a id="boardBtn" href="index.html" title="Back to the board" onclick="window.location.href=this.href; return false;">‹ board</a>
  </header>

  <div id="settings">
    <div class="panel">
      <h3>Customize sky view</h3>
      <div class="lbl">Show the nearest…</div>
      <div class="seg" id="modeSeg">
        <button data-mode="planes"><span class="ic">✈</span>Plane</button>
        <button data-mode="trains"><span class="ic">🚆</span>Train</button>
        <button data-mode="buses"><span class="ic">🚌</span>Bus</button>
      </div>
      <div class="lbl">Theme</div>
      <div class="seg" id="themeSeg">
        <button data-theme="dark"><span class="ic">🌘</span>Dark</button>
        <button data-theme="black"><span class="ic">⬛</span>Black</button>
        <button data-theme="day"><span class="ic">☀️</span>Day</button>
      </div>
      <div class="lbl">Sky colors</div>
      <div class="seg" id="skySeg">
        <button data-sky="on"><span class="ic">🌇</span>On</button>
        <button data-sky="off"><span class="ic">🚫</span>Off</button>
      </div>
      <div class="lbl">Color</div>
      <div class="swatches" id="swatches"></div>
      <button class="done" id="setDone">Done</button>
    </div>
  </div>

  <main id="main">
    <div class="empty pulse" id="loading">Scanning the sky…</div>

    <div id="flight" style="display:none">
      <div class="txt">
        <div class="dist" id="dist"></div>
        <div class="airline" id="airline"></div>
        <div class="flight" id="flightno"></div>
        <div class="route" id="route"></div>
        <div class="subcity" id="subcity"></div>
        <div class="progress" id="progress">
          <div class="bar"><div class="fill" id="progFill"></div><div class="dot" id="progDot"></div></div>
          <div class="lbl"><span id="progFlown"></span><span class="pct" id="progPct"></span><span id="progToGo"></span></div>
        </div>
        <div class="status" id="status"></div>
      </div>
      <div class="side">
        <figure class="photo" id="photoWrap" style="display:none">
          <img id="photo" alt="Photo of this aircraft" />
          <figcaption><a id="photoCredit" target="_blank" rel="noopener"></a></figcaption>
        </figure>
        <div id="miniMap"></div>
      </div>
    </div>
  </main>

  <footer>
    <span id="rangeLbl">aircraft within 30 nm</span>
    <span id="loclbl"></span>
    <span id="updated"></span>
  </footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
"use strict";
/* The sky view is shared by all the boards. Which one opened it comes in
   via ?city=dc|philly|nyc (each board's "Sky" link sets this) so it can use
   that board's own saved location (same localStorage key the board itself
   reads/writes) instead of a hardcoded DC default — this is what used to
   make Philadelphia's sky view show DC stuff. */
const CITY_CONFIG = {
  // lsMarcUrl/lsSeptaUrl mirror the board's own live-Worker settings so night
  // mode can pick up the SAME live positions once you've configured one there
  // -- nothing to set up twice. Ride On has no live source at all (see memory:
  // no public API/GTFS-RT feed exists), so Bethesda's buses stay schedule-only.
  // lsBusUrl is a SEPARATE field from lsSeptaUrl even though Philly's happens
  // to be the same URL (one septa-worker.js Worker serves both /trainview and
  // /transitview) -- NYC's rail and bus live sources are genuinely unrelated
  // (rail needs no Worker at all; bus needs its own, different Worker), so
  // they can't share one field the way Philly's incidentally can.
  dc: { defaultLoc:{ lat:38.9582, lon:-77.1080, label:"Bethesda, MD 20816" },
    lsLoc:"transitboard.loc", lsManual:"transitboard.locManual", board:"index.html",
    busSchedule:"rideon-schedule.json", busTag:"🚌 Nearest Ride On bus", busRange:"Ride On routes 23 & 29",
    lsMarcUrl:"transitboard.marcUrl", lsSeptaUrl:null, lsBusUrl:null,
    localRailSystem:"MARC", localBusSystem:"Ride On", busPhotoQuery:"Ride On bus Montgomery County Maryland",
    cityLabel:"Washington DC" },
  philly: { defaultLoc:{ lat:39.9812, lon:-75.1563, label:"Temple University, Philadelphia" },
    lsLoc:"transitboardphl.loc", lsManual:"transitboardphl.locManual", board:"philadelphia.html",
    busSchedule:"septa-bus-schedule.json", busTag:"🚌 Nearest SEPTA bus", busRange:"SEPTA Bus routes 3, 4 & 16",
    lsMarcUrl:null, lsSeptaUrl:"transitboardphl.septaUrl", lsBusUrl:"transitboardphl.septaUrl",
    localRailSystem:"SEPTA", localBusSystem:"SEPTA", busPhotoQuery:"SEPTA bus Philadelphia",
    cityLabel:"Philadelphia" },
  // NYC has three native live rail modes (subway/LIRR/Metro-North), all
  // zero-setup (no Worker/key -- see nyc.html), unlike Bethesda/Philly's one
  // Worker-optional rail system each -- so nycRail:true routes "nearest train"
  // to produceNycRailTrain() instead of the lsMarcUrl/lsSeptaUrl branches.
  // MTA Bus still needs its own optional Worker like SEPTA bus does, via the
  // separate lsBusUrl field.
  nyc: { defaultLoc:{ lat:40.7506, lon:-73.9935, label:"Penn Station, New York, NY" },
    lsLoc:"transitboardnyc.loc", lsManual:"transitboardnyc.locManual", board:"nyc.html",
    busSchedule:"mta-bus-schedule.json", busTag:"🚌 Nearest MTA bus", busRange:"MTA Bus M42/M15/M34/M34A",
    lsMarcUrl:null, lsSeptaUrl:null, lsBusUrl:"transitboardnyc.busUrl",
    localRailSystem:"Subway/LIRR/MNR", localBusSystem:"MTA Bus", busPhotoQuery:"MTA bus New York City",
    cityLabel:"New York", nycRail:true },
  // Boston's nearest-bus reads the bundled SL + Route 1 schedule; nearest
  // train is Amtrak-only for now (no live local-rail source wired here yet --
  // boston.html's own map uses the MBTA v3 API directly).
  boston: { defaultLoc:{ lat:42.3519, lon:-71.0552, label:"South Station, Boston, MA" },
    lsLoc:"transitboardboston.loc", lsManual:"transitboardboston.locManual", board:"boston.html",
    busSchedule:"mbta-bus-schedule.json", busTag:"🚌 Nearest MBTA bus", busRange:"Silver Line + Route 1",
    lsMarcUrl:null, lsSeptaUrl:null, lsBusUrl:null,
    localRailSystem:"MBTA", localBusSystem:"MBTA", busPhotoQuery:"MBTA Silver Line bus Boston",
    cityLabel:"Boston" },
  // Amsterdam's "nearest bus" is the nearest GVB tram (bundled Dutch GTFS,
  // tz-aware -- the bundle carries tz:"Europe/Amsterdam"); nearest train is
  // Amtrak-only, i.e. empty in Europe. Nearest flight = Schiphol traffic.
  amsterdam: { defaultLoc:{ lat:52.3791, lon:4.9003, label:"Amsterdam Centraal" },
    lsLoc:"transitboardamsterdam.loc", lsManual:"transitboardamsterdam.locManual", board:"amsterdam.html",
    busSchedule:"ams-tram-schedule.json", busTag:"🚋 Nearest tram", busRange:"GVB trams",
    lsMarcUrl:null, lsSeptaUrl:null, lsBusUrl:null,
    localRailSystem:"NS", localBusSystem:"GVB", busPhotoQuery:"GVB tram Amsterdam",
    cityLabel:"Amsterdam" },
  // LA's "nearest bus" is the nearest Metro Rail train; SF's is the nearest
  // cable car. Both bundles carry tz:"America/Los_Angeles".
  la: { defaultLoc:{ lat:34.0562, lon:-118.2365, label:"Union Station, Los Angeles" },
    lsLoc:"transitboardla.loc", lsManual:"transitboardla.locManual", board:"losangeles.html",
    busSchedule:"la-rail-schedule.json", busTag:"🚇 Nearest Metro Rail", busRange:"Metro A/B/C/D/E/K",
    lsMarcUrl:null, lsSeptaUrl:null, lsBusUrl:null,
    localRailSystem:"Metrolink", localBusSystem:"LA Metro", busPhotoQuery:"LA Metro Rail train Los Angeles",
    cityLabel:"Los Angeles" },
  sf: { defaultLoc:{ lat:37.7844, lon:-122.4078, label:"Powell St, San Francisco" },
    lsLoc:"transitboardsf.loc", lsManual:"transitboardsf.locManual", board:"sanfrancisco.html",
    busSchedule:"sf-cablecar-schedule.json", busTag:"🚋 Nearest cable car", busRange:"Powell-Mason · Powell-Hyde · California",
    lsMarcUrl:null, lsSeptaUrl:null, lsBusUrl:null,
    localRailSystem:"BART/Caltrain", localBusSystem:"cable car", busPhotoQuery:"San Francisco cable car",
    cityLabel:"San Francisco" },
};
// Falls back to "dc" for any unrecognized/missing ?city= value (which also
// keeps old ?city=bethesda links working -- "bethesda" is no longer a key,
// so it lands on the DC config it always meant).
const CITY_PARAM = new URLSearchParams(location.search).get("city");
const CITY = CITY_CONFIG[CITY_PARAM] ? CITY_PARAM : "dc";
const CITY_CFG = CITY_CONFIG[CITY];
function loadLiveUrl(key){ return key ? (localStorage.getItem(key)||"") : ""; }
const CFG = {
  defaultLoc: CITY_CFG.defaultLoc,
  radiusNm: 30,
  refreshMs: 12000,
};
function loadBoardLoc(){
  try{ const s=JSON.parse(localStorage.getItem(CITY_CFG.lsLoc)); if(s&&s.lat) return s; }catch(e){}
  return null;
}
function boardLocIsManual(){ return localStorage.getItem(CITY_CFG.lsManual)==="1"; }
let loc = loadBoardLoc() || CFG.defaultLoc;
const routeCache = loadRouteCache();

const $ = s=>document.querySelector(s);
function loadRouteCache(){ try{ const c=JSON.parse(localStorage.getItem("nightmode.routes")||"{}"); return c; }catch(e){ return {}; } }
function saveRouteCache(){ try{ localStorage.setItem("nightmode.routes", JSON.stringify(routeCache)); }catch(e){} }

async function getJSON(url, timeout=10000){
  const c=new AbortController(); const t=setTimeout(()=>c.abort(), timeout);
  try{ const r=await fetch(url,{signal:c.signal}); if(!r.ok) throw new Error(r.status); return await r.json(); }
  finally{ clearTimeout(t); }
}
function haversineNm(a,b){
  const R=3440.065, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lon-a.lon)*Math.PI/180;
  const s=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
const COMPASS=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
function bearingFrom(a,b){
  const y=Math.sin((b.lon-a.lon)*Math.PI/180)*Math.cos(b.lat*Math.PI/180);
  const x=Math.cos(a.lat*Math.PI/180)*Math.sin(b.lat*Math.PI/180)-Math.sin(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.cos((b.lon-a.lon)*Math.PI/180);
  return COMPASS[Math.round((Math.atan2(y,x)*180/Math.PI+360)%360/22.5)%16];
}

/* ---- flight route lookup (adsbdb: airline + origin + destination) ---- */
async function lookupRoute(callsign){
  if(!callsign) return null;
  const hit=routeCache[callsign];
  if(hit && Date.now()-hit.t < 216e5) return hit.v;          // cache 6h
  try{
    const d=await getJSON(`https://api.adsbdb.com/v0/callsign/${encodeURIComponent(callsign)}`);
    const fr=d && d.response && d.response.flightroute;
    const v = fr ? { airline:fr.airline, origin:fr.origin, destination:fr.destination } : null;
    routeCache[callsign]={ t:Date.now(), v }; saveRouteCache();
    return v;
  }catch(e){ routeCache[callsign]={ t:Date.now(), v:null }; return null; }
}

/* ---- aircraft photo (planespotters.net public API, by ADS-B hex) ---- */
const photoCache = (function(){ try{ return JSON.parse(localStorage.getItem("nightmode.photos")||"{}"); }catch(e){ return {}; } })();
function savePhotoCache(){ try{ localStorage.setItem("nightmode.photos", JSON.stringify(photoCache)); }catch(e){} }
async function lookupPhoto(hex){
  if(!hex) return null;
  const hit=photoCache[hex];
  if(hit && Date.now()-hit.t < 864e5) return hit.v;            // cache 24h
  let v=null;
  try{
    const d=await getJSON(`https://api.planespotters.net/pub/photos/hex/${encodeURIComponent(hex)}`);
    const p=d && d.photos && d.photos[0];
    if(p) v={ src:(p.thumbnail_large||p.thumbnail||{}).src||"", link:p.link||"", cred:p.photographer||"" };
  }catch(e){}
  photoCache[hex]={ t:Date.now(), v }; savePhotoCache();
  return v;
}
/* ---- representative train/bus photos (Wikimedia Commons search, CORS-open
   via origin=*, no key needed). Unlike the plane photo above, this is NOT a
   photo of the exact vehicle -- there's no public per-vehicle photo lookup for
   MARC/Ride On/SEPTA/PATCO/Amtrak the way planespotters covers aircraft by ADS-B
   hex -- so it's a representative photo of that line/system, clearly labeled
   as such and cached for a month since the "right" photo for a line doesn't
   change. */
async function fetchWikiPhoto(query){
  try{
    const url=`https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrnamespace=6&gsrlimit=1&prop=imageinfo&iiprop=url|extmetadata&iiurlwidth=1000&format=json&origin=*`;
    const d=await getJSON(url, 10000);
    const pages=d && d.query && d.query.pages;
    const page=pages && Object.values(pages)[0];
    const info=page && page.imageinfo && page.imageinfo[0];
    if(!info) return null;
    const artist=(((info.extmetadata||{}).Artist||{}).value||"").replace(/<[^>]+>/g,"").trim();
    return { src:info.thumburl||info.url, link:info.descriptionurl||"", cred:artist };
  }catch(e){ return null; }
}
async function lookupWikiPhoto(query, fallbackQuery){
  const key="wiki:"+query;
  const hit=photoCache[key];
  if(hit && Date.now()-hit.t < 30*864e5) return hit.v;          // cache 30 days -- these don't change
  let v=await fetchWikiPhoto(query);
  if(!v && fallbackQuery && fallbackQuery!==query) v=await fetchWikiPhoto(fallbackQuery);
  photoCache[key]={ t:Date.now(), v }; savePhotoCache();
  return v;
}

let miniMap=null, miniRouteLayer=null, miniVehLayer=null, miniVeh=null, miniVehKind=null;
function initMiniMap(){
  if(miniMap) return;
  miniMap=L.map("miniMap",{ zoomControl:false, attributionControl:false, dragging:false,
    scrollWheelZoom:false, doubleClickZoom:false, boxZoom:false, keyboard:false, touchZoom:false, fadeAnimation:false })
    .setView([0,0], 3);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", { maxZoom:19 }).addTo(miniMap);
  miniRouteLayer=L.layerGroup().addTo(miniMap);   // endpoints + route line, rebuilt each render
  miniVehLayer=L.layerGroup().addTo(miniMap);      // vehicle marker, persists so it can glide via setLatLng
  // Same root cause as the board's own #map (see index.html's initMap()): Leaflet
  // sizes itself once at construction and won't notice a later resize on its own.
  // Here the trigger is the async representative-photo fetch -- .side is
  // flex-direction:row with height:auto in the portrait/mobile layout, so when
  // the photo figure appears next to this map (or the page is resized), the
  // row's height changes and tiles end up positioned for the old size, leaving
  // a visible gap until something calls invalidateSize(). Only invalidateSize()
  // here (no setView) so this doesn't fight renderMiniMap()'s own glide/pan logic.
  if("ResizeObserver" in window){
    new ResizeObserver(()=>miniMap.invalidateSize()).observe(document.getElementById("miniMap"));
  }
}
let miniMapFor=null;
function renderMiniMap(id, oLL, dLL, posLL){
  const wrap=$("#miniMap");
  if(!posLL){ wrap.style.display="none"; miniMapFor=null; return; }
  wrap.style.display="block";
  initMiniMap();
  miniMap.invalidateSize();
  // Only redraw endpoints/route and re-fit the view for a NEW subject (a
  // different vehicle, or switching plane/train/bus). Re-fitting on every
  // 12s refresh -- even though the vehicle barely moved -- was what made the
  // map feel janky (the whole view jumping/rezooming constantly). For the
  // same subject, just glide the marker and gently pan if it nears the edge.
  if(miniMapFor!==id){
    miniRouteLayer.clearLayers();
    const pts=[[posLL.lat,posLL.lon]];
    if(oLL){ L.marker([oLL.lat,oLL.lon],{icon:L.divIcon({className:"mini-endpt-wrap",html:'<span class="mini-endpt"></span>',iconSize:[9,9],iconAnchor:[4,4]})}).addTo(miniRouteLayer); pts.push([oLL.lat,oLL.lon]); }
    if(dLL){ L.marker([dLL.lat,dLL.lon],{icon:L.divIcon({className:"mini-endpt-wrap",html:'<span class="mini-endpt"></span>',iconSize:[9,9],iconAnchor:[4,4]})}).addTo(miniRouteLayer); pts.push([dLL.lat,dLL.lon]); }
    if(oLL && dLL) L.polyline([[oLL.lat,oLL.lon],[dLL.lat,dLL.lon]], {color:"#7d95c9", weight:2, opacity:.45, dashArray:"1 8"}).addTo(miniRouteLayer);
    if(pts.length>1) miniMap.fitBounds(pts, {padding:[26,26], maxZoom:11});
    else miniMap.setView([posLL.lat,posLL.lon], 11);
    miniMapFor=id;
  }
  if(!miniVeh || miniVehKind!==mode){
    if(miniVeh) miniVehLayer.removeLayer(miniVeh);
    miniVeh=L.marker([posLL.lat,posLL.lon], {icon:vehDivIcon(mode)}).addTo(miniVehLayer);
    miniVehKind=mode;
  } else {
    miniVeh.setLatLng([posLL.lat,posLL.lon]);
    if(!miniMap.getBounds().pad(-.12).contains([posLL.lat,posLL.lon])) miniMap.panTo([posLL.lat,posLL.lon], {animate:true});
  }
}

/* ---- real sunrise/sunset sky colors ----
   Low-precision solar position formula (Julian-day mean longitude/anomaly ->
   ecliptic -> equatorial -> hour angle via GMST), the same approach SunCalc-style
   libraries use, accurate to well under a degree -- plenty for driving a color
   gradient. No CDN dependency, matching the rest of this project's zero-setup bundled
   approach. Returns the sun's elevation in degrees above the horizon for `date` at
   `lat`,`lon` (0 = right on the horizon, i.e. sunrise/sunset itself). */
function sunElevationDeg(date, lat, lon){
  const rad=Math.PI/180, d=(date.getTime()-Date.UTC(2000,0,1,12,0,0))/86400000; // days since J2000.0
  const meanLon=(280.460+0.9856474*d)%360, meanAnom=(357.528+0.9856003*d)%360;
  const eclLon=meanLon+1.915*Math.sin(meanAnom*rad)+0.020*Math.sin(2*meanAnom*rad);
  const oblEcl=23.439-0.0000004*d;
  const ra=Math.atan2(Math.cos(oblEcl*rad)*Math.sin(eclLon*rad), Math.cos(eclLon*rad))/rad;
  const decl=Math.asin(Math.sin(oblEcl*rad)*Math.sin(eclLon*rad))/rad;
  const gmst=((18.697374558+24.06570982441908*d)%24+24)%24;
  let lst=((gmst+lon/15)%24+24)%24, raHours=((ra/15)%24+24)%24;
  let ha=(lst-raHours)*15; if(ha>180) ha-=360; if(ha<-180) ha+=360;
  const latR=lat*rad, declR=decl*rad, haR=ha*rad;
  return Math.asin(Math.sin(latR)*Math.sin(declR)+Math.cos(latR)*Math.cos(declR)*Math.cos(haR))/rad;
}
/* Horizon(bottom)/mid/top(zenith) hex colors + overall opacity at key sun
   elevations, hand-picked to peak in vivid orange/pink/gold right at elevation 0
   (sunrise/sunset itself), pass through indigo/violet twilight on the way down
   into night, and fade to near-invisible once the sun is well up -- so daytime
   stays close to the app's normal palette instead of looking tinted. */
const SUN_STOPS=[
  { el:-18, top:"#000000", mid:"#02040c", bot:"#050b1c", op:.12 },
  { el:-12, top:"#03050f", mid:"#0c1030", bot:"#151048", op:.25 },
  { el:-6,  top:"#0a0f2e", mid:"#2c1f5e", bot:"#5b2a6b", op:.42 },
  { el:-2,  top:"#152a5e", mid:"#8a3a6b", bot:"#e8623f", op:.60 },
  { el:0,   top:"#1c3f7a", mid:"#d16a63", bot:"#ffab4d", op:.72 },
  { el:4,   top:"#3a72b8", mid:"#a7c3e8", bot:"#ffd28a", op:.45 },
  { el:12,  top:"#3f86c9", mid:"#bcd9f5", bot:"#f2e7cf", op:.20 },
  { el:30,  top:"#3f86c9", mid:"#bcd9f5", bot:"#eaf3ff", op:.06 },
];
function lerpRgb(a,b,t){ return a.map((v,i)=>v+(b[i]-v)*t); }
function sunSkyColors(el){
  const s=SUN_STOPS;
  if(el<=s[0].el) return { top:s[0].top, mid:s[0].mid, bot:s[0].bot, op:s[0].op };
  if(el>=s[s.length-1].el){ const last=s[s.length-1]; return { top:last.top, mid:last.mid, bot:last.bot, op:last.op }; }
  let a=s[0], b=s[s.length-1];
  for(let i=0;i<s.length-1;i++){ if(el>=s[i].el && el<=s[i+1].el){ a=s[i]; b=s[i+1]; break; } }
  const t=(el-a.el)/(b.el-a.el);
  return {
    top: rgbStr(lerpRgb(hexToRgb(a.top), hexToRgb(b.top), t)),
    mid: rgbStr(lerpRgb(hexToRgb(a.mid), hexToRgb(b.mid), t)),
    bot: rgbStr(lerpRgb(hexToRgb(a.bot), hexToRgb(b.bot), t)),
    op: a.op+(b.op-a.op)*t,
  };
}
function sunSkyEnabled(){ return localStorage.getItem("nightmode.sunsky")!=="0"; }
function updateSunSky(){
  const el=$("#sunSky"); if(!el) return;
  if(!sunSkyEnabled()){ el.style.opacity=0; return; }
  const c=sunSkyColors(sunElevationDeg(new Date(), loc.lat, loc.lon));
  el.style.background=`linear-gradient(to top, ${c.bot}, ${c.mid} 45%, ${c.top} 100%)`;
  el.style.opacity=c.op;
}
function setSunSky(v){
  localStorage.setItem("nightmode.sunsky", v==="off"?"0":"1");
  document.querySelectorAll("#skySeg button").forEach(b=>b.classList.toggle("active", b.dataset.sky===v));
  updateSunSky();
}

let photoShownFor=null;
async function updatePhoto(key, representative, fallbackQuery){
  const wrap=$("#photoWrap");
  if(photoShownFor===key) return;                              // same subject — keep photo
  const v = representative ? await lookupWikiPhoto(key, fallbackQuery) : await lookupPhoto(key);
  photoShownFor=key;
  if(v && v.src){
    $("#photo").src=v.src;
    $("#photo").alt = representative ? "Representative photo of this line" : "Photo of this aircraft";
    const a=$("#photoCredit"); a.href=v.link||"#";
    a.textContent = representative
      ? (v.cred?`${v.cred} · Wikimedia Commons`:"Wikimedia Commons")+" (representative photo)"
      : (v.cred?`photo © ${v.cred} · planespotters.net`:"planespotters.net");
    wrap.style.display="";
  } else wrap.style.display="none";
}

function isRealLateNight(late){ return typeof late==="number" && isFinite(late) && late>0 && Math.abs(late)<=90; }

/* ---- PLANES ---- */
async function producePlane(){
  const data=await getJSON(`https://api.airplanes.live/v2/point/${loc.lat.toFixed(4)}/${loc.lon.toFixed(4)}/${CFG.radiusNm}`);
  const air=(data.ac||[]).filter(a=>a.alt_baro!=="ground" && typeof a.lat==="number" && typeof a.lon==="number")
    .map(a=>({a, nm: a.dst!=null? a.dst : haversineNm(loc,{lat:a.lat,lon:a.lon})})).sort((x,y)=>x.nm-y.nm);
  if(!air.length) return null;
  let pick=null;
  for(const x of air.filter(x=>/^[A-Z]{3}\d/.test((x.a.flight||"").trim())).slice(0,4)){
    const route=await lookupRoute((x.a.flight||"").trim());
    if(route && route.origin && route.destination){ pick={...x, route}; break; }
  }
  if(!pick) pick={...air[0], route:null};
  const {a, nm, route}=pick, spd=a.gs?Math.round(a.gs):null;
  const oLL=route&&route.origin&&typeof route.origin.latitude==="number"?{lat:route.origin.latitude,lon:route.origin.longitude}:null;
  const dLL=route&&route.destination&&typeof route.destination.latitude==="number"?{lat:route.destination.latitude,lon:route.destination.longitude}:null;
  let eta=`<span class="badge na">en route</span>`;
  if(dLL && a.gs>40){ const mins=Math.round(haversineNm({lat:a.lat,lon:a.lon},dLL)/a.gs*60);
    if(mins>=0&&mins<600){ const arr=new Date(Date.now()+mins*60000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      eta=mins<=1?`<span class="badge ok">landing now</span>`:`<span class="badge ok">≈ ${mins} min · arr ${arr}</span>`; } }
  const prog=journeyProgress(oLL, dLL, {lat:a.lat,lon:a.lon});
  return { id:"p"+a.hex, nm, unit:"nm", dir:bearingFrom(loc,{lat:a.lat,lon:a.lon}), count:air.length,
    altText: typeof a.alt_baro==="number"?`${a.alt_baro.toLocaleString()} ft`:"",
    title: airlineName(route,a), sub:[(a.flight||"").trim(), a.desc||a.t, a.r].filter(Boolean).join("  ·  "),
    oCity: route?(route.origin.municipality||route.origin.iata_code):null,
    dCity: route?(route.destination.municipality||route.destination.iata_code):null,
    subline: route?`${route.origin.iata_code||""} ${route.origin.name||""}  →  ${route.destination.iata_code||""} ${route.destination.name||""}`.trim():(a.ownOp||"General aviation — no scheduled route"),
    oLL, dLL, posLL:{lat:a.lat,lon:a.lon}, oCode:route?route.origin.iata_code:"", dCode:route?route.destination.iata_code:"",
    progPct: prog?prog.pct:null, progFlown: prog?prog.flownNm:null, progToGo: prog?prog.toGoNm:null,
    statusHtml: emergencyBadge(a)+`<span class="phase">${phaseOf(a)}</span>`+(spd?`<span class="alt">${spd} kt</span>`:"")
      +vRateChip(a.baro_rate)+headingChip(a.track)+eta, photoHex:a.hex };
}

/* ---- TRAINS (Amtrak) ---- */
let amStations=null;
async function ensureAmStations(){
  if(amStations) return amStations;
  try{ const d=await getJSON("https://api-v3.amtraker.com/v3/stations",12000); const m={};
    for(const c in d){ const s=d[c]; if(typeof s.lat==="number") m[c]=[s.lat,s.lon]; } amStations=m; }catch(e){ amStations={}; }
  return amStations;
}
async function produceAmtrakTrain(){
  const data=await getJSON("https://api-v3.amtraker.com/v3/trains",12000), st=await ensureAmStations(), list=[];
  for(const arr of Object.values(data)) for(const t of (arr||[])){
    if(typeof t.lat!=="number"||typeof t.lon!=="number") continue;
    if(t.trainState && t.trainState!=="Active") continue;
    list.push({t, mi: haversineNm(loc,{lat:t.lat,lon:t.lon})*1.15078});
  }
  list.sort((x,y)=>x.mi-y.mi);
  if(!list.length) return null;
  const {t, mi}=list[0];
  const oLL=st[t.origCode]?{lat:st[t.origCode][0],lon:st[t.origCode][1]}:null;
  const dLL=st[t.destCode]?{lat:st[t.destCode][0],lon:st[t.destCode][1]}:null;
  let eta="";
  if(dLL && t.velocity>20){ const mins=Math.round(haversineNm({lat:t.lat,lon:t.lon},dLL)*1.15078/t.velocity*60);
    if(mins>=0&&mins<900){ const arr=new Date(Date.now()+mins*60000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      eta=mins<=1?`<span class="badge ok">arriving</span>`:`<span class="badge ok">≈ ${mins} min · arr ${arr}</span>`; } }
  const late=(t.trainTimely||"").trim(), nx=amtrakNextStop(t);
  const prog=journeyProgress(oLL, dLL, {lat:t.lat,lon:t.lon});   // Amtrak distances are shown in miles
  return { id:"t"+(t.trainID||t.trainNum), nm:mi, unit:"mi", dir:bearingFrom(loc,{lat:t.lat,lon:t.lon}), count:list.length,
    altText:`${Math.round(t.velocity||0)} mph`, title:t.routeName||"Amtrak",
    sub:`Train ${t.trainNum} · Amtrak${late?"  ·  "+late:""}`,
    oCity:t.origName||t.origCode, dCity:t.destName||t.destCode,
    subline:`${t.origCode||""} ${t.origName||""}  →  ${t.destCode||""} ${t.destName||""}`.trim(),
    oLL, dLL, posLL:{lat:t.lat,lon:t.lon}, oCode:t.origCode||"", dCode:t.destCode||"",
    progPct: prog?prog.pct:null, progFlown: prog?prog.flownNm*1.15078:null, progToGo: prog?prog.toGoNm*1.15078:null,
    statusHtml:`<span class="phase">en route</span>`+headingChip(t.heading)
      +(nx?nextStopChip(nx.name, nx.time, nx.note):"")+eta,
    photoQuery:`Amtrak ${t.routeName||"train"} train`, photoFallback:"Amtrak train exterior" };
}
/* ---- NYC: subway/LIRR/Metro-North, all direct-fetch (no Worker/key needed --
   see nyc.html) via the same minimal GTFS-Realtime protobuf decoder built
   there. Ported here rather than shared via a separate file since these are
   small, pure, self-contained functions (no dependency on nyc.html's own
   `state` object) and this project has no build step to share modules with
   otherwise. */
function* gtfsrtFields(b, start, end){
  let i = start;
  while(i < end){
    const [key, ni] = gtfsrtVarint(b, i); i = ni;
    const field = Number(key >> 3n), wt = Number(key & 7n);
    if(wt === 0){ const [v, n] = gtfsrtVarint(b, i); i = n; yield [field, 0, v]; }
    else if(wt === 2){ const [len, n] = gtfsrtVarint(b, i); const l = Number(len); yield [field, 2, [n, n + l]]; i = n + l; }
    else if(wt === 5){ yield [field, 5, i]; i += 4; }
    else if(wt === 1){ i += 8; }
    else throw new Error("bad wiretype "+wt);
  }
}
function gtfsrtVarint(b, i){
  let result = 0n, shift = 0n, x;
  do{ x = BigInt(b[i++]); result |= (x & 0x7fn) << shift; shift += 7n; }while(x & 0x80n);

async function produceBus(){

  const toGo=Math.max(0, haversineNm(posLL, dLL));
  const flown=Math.max(0, total-toGo);
  return { pct:Math.max(0, Math.min(1, flown/total)), flownNm:flown, toGoNm:toGo };
}

let lastId=null;
function render(s){
  $("#updated").textContent = "updated "+new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  const L=$("#loading");
  if(s && s.needKey){
    $("#flight").style.display="none"; L.style.display=""; L.classList.remove("pulse");
    L.textContent="Add a WMATA key on the board to track buses"; renderMiniMap(null,null,null,null); return;
  }
  if(!s){
    $("#flight").style.display="none"; L.style.display=""; L.classList.remove("pulse");
    L.textContent = mode==="planes"?"No aircraft overhead":mode==="trains"?"No trains nearby":"No buses nearby";
    return;
  }
  L.style.display="none";
  const fl=$("#flight"); fl.style.display="";
  if(lastId!==null && lastId!==s.id){ fl.classList.remove("swap"); void fl.offsetWidth; fl.classList.add("swap"); }
  lastId=s.id;
  if(s.photoHex) updatePhoto(s.photoHex, false);
  else if(s.photoQuery) updatePhoto(s.photoQuery, true, s.photoFallback);
  else { $("#photoWrap").style.display="none"; photoShownFor=null; }
  renderMiniMap(s.id, s.oLL, s.dLL, s.posLL);
  $("#dist").textContent = `${s.nm.toFixed(1)} ${s.unit||"nm"} ${s.dir}${s.altText?` · ${s.altText}`:""}`
    + (s.count>1?` · nearest of ${s.count}`:"");
  // journey-progress bar (planes/Amtrak with a known origin→destination)
  const pv=$("#progress");
  if(typeof s.progPct==="number"){
    const u=s.unit||"nm", pctTxt=(s.progPct*100).toFixed(1)+"%";
    pv.style.display="block";
    $("#progFill").style.width=pctTxt; $("#progDot").style.left=pctTxt;
    $("#progFlown").textContent=`${Math.round(s.progFlown).toLocaleString()} ${u} flown`;
    $("#progPct").textContent=`${Math.round(s.progPct*100)}%`;
    $("#progToGo").textContent=`${Math.round(s.progToGo).toLocaleString()} ${u} to go`;
  } else pv.style.display="none";
  $("#airline").textContent = s.title;
  $("#flightno").textContent = s.sub;
  const routeEl=$("#route");
  if(s.dCity){
    routeEl.innerHTML = (s.oCity?`<span class="city">${escapeHtml(s.oCity)}</span><span class="arrow">→</span>`:`<span class="arrow">→</span>`)
      + `<span class="city">${escapeHtml(s.dCity)}</span>`;
    routeEl.style.display="";
  } else routeEl.style.display="none";
  const subEl=$("#subcity"); subEl.textContent=s.subline||""; subEl.style.display=s.subline?"":"none";
  $("#status").innerHTML = s.statusHtml;
}
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function tick(){
  const fn=PRODUCERS[mode]; if(!fn) return;
  try{ render(await fn()); }catch(e){ /* keep last render */ }
}

/* ---- theme (color) + mode selection + settings panel ---- */
const PRESETS=[["#7db8ff","Blue"],["#ffb454","Amber"],["#3ad0c8","Teal"],["#5ad17a","Green"],["#b39dff","Violet"],["#ff8fab","Rose"]];
function hexToRgb(h){ h=(h||"").replace("#",""); if(h.length===3)h=h.split("").map(c=>c+c).join(""); const n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function rgbStr(a){ return "rgb("+a.map(v=>Math.max(0,Math.min(255,Math.round(v)))).join(",")+")"; }
function setTheme(hex){
  localStorage.setItem("nightmode.accent", hex);
  document.querySelectorAll("#swatches .sw[data-hex]").forEach(el=>el.classList.toggle("active", el.dataset.hex.toLowerCase()===hex.toLowerCase()));
  const nightTheme=document.documentElement.dataset.theme||"dark";
  if(nightTheme==="day"){
    // Day uses its own fixed light palette (CSS above) so text/bg stay readable
    // on a light background -- the picked accent hex doesn't drive it, unlike
    // Dark/Black below. Clear any leftover inline overrides from a prior mode.
    ["--bg","--amber","--amber-dim","--muted","--faint","--city","--glow"].forEach(p=>document.documentElement.style.removeProperty(p));
  } else {
    const a=hexToRgb(hex), R=document.documentElement.style, sc=(f)=>a.map(v=>v*f), mw=(t)=>a.map(v=>v+(255-v)*t);
    R.setProperty("--amber",rgbStr(a)); R.setProperty("--amber-dim",rgbStr(sc(.62)));
    R.setProperty("--muted",rgbStr(sc(.42))); R.setProperty("--faint",rgbStr(sc(.20)));
    R.setProperty("--city",rgbStr(mw(.72))); R.setProperty("--glow",rgbStr(sc(.34)));
    R.setProperty("--bg", nightTheme==="black" ? "#000000" : rgbStr(sc(.035)));
  }
  const mt=document.querySelector('meta[name="theme-color"]');
  if(mt) mt.setAttribute("content", getComputedStyle(document.documentElement).getPropertyValue("--bg").trim()||"#010409");
}
function setNightTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("nightmode.theme", t);
  document.querySelectorAll("#themeSeg button").forEach(b=>b.classList.toggle("active", b.dataset.theme===t));
  setTheme(localStorage.getItem("nightmode.accent")||"#7db8ff");
}
function buildSwatches(){
  const wrap=$("#swatches"); wrap.innerHTML="";
  PRESETS.forEach(([hex,name])=>{ const b=document.createElement("button"); b.className="sw"; b.dataset.hex=hex; b.title=name; b.style.background=hex; b.onclick=()=>setTheme(hex); wrap.appendChild(b); });
  const custom=document.createElement("label"); custom.className="sw custom"; custom.title="Custom color";
  const inp=document.createElement("input"); inp.type="color"; inp.value=localStorage.getItem("nightmode.accent")||"#7db8ff";
  inp.oninput=()=>setTheme(inp.value); custom.appendChild(inp); wrap.appendChild(custom);
}
function setMode(m){
  mode=m; localStorage.setItem("nightmode.subject", m);
  $("#tag").textContent=TAGS[m]; $("#rangeLbl").textContent=RANGE[m];
  document.querySelectorAll("#modeSeg button").forEach(b=>b.classList.toggle("active", b.dataset.mode===m));
  lastId=null; photoShownFor=null; $("#photoWrap").style.display="none"; $("#flight").style.display="none";
  if(miniVehLayer){ miniVehLayer.clearLayers(); miniVeh=null; miniVehKind=null; miniMapFor=null; }
  const L=$("#loading"); L.style.display=""; L.classList.add("pulse");
  L.textContent = m==="planes"?"Scanning the sky…":m==="trains"?"Finding trains…":"Finding buses…";
  tick();
}
function initSettings(){
  buildSwatches();
  $("#setBtn").onclick=()=>$("#settings").classList.add("show");
  $("#setDone").onclick=()=>$("#settings").classList.remove("show");
  $("#settings").addEventListener("click",e=>{ if(e.target.id==="settings") $("#settings").classList.remove("show"); });
  $("#modeSeg").addEventListener("click",e=>{ const b=e.target.closest("button"); if(b) setMode(b.dataset.mode); });
  $("#themeSeg").addEventListener("click",e=>{ const b=e.target.closest("button"); if(b) setNightTheme(b.dataset.theme); });
  $("#skySeg").addEventListener("click",e=>{ const b=e.target.closest("button"); if(b) setSunSky(b.dataset.sky); });
}
function clock(){ $("#clock").textContent=new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); }

/* ---- full-screen kiosk mode + keep-awake ---- */
const SVG_EXPAND=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m8 0h3a2 2 0 0 0 2-2v-3"/></svg>`;
const SVG_COMPRESS=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3m8 0v-3a2 2 0 0 1 2-2h3"/></svg>`;
let wakeLock=null;
async function requestWake(){ try{ if("wakeLock" in navigator) wakeLock=await navigator.wakeLock.request("screen"); }catch(e){} }
async function releaseWake(){ try{ if(wakeLock) await wakeLock.release(); }catch(e){} wakeLock=null; }
function fsElement(){ return document.fullscreenElement || document.webkitFullscreenElement; }
function toggleFullscreen(){
  const el=document.documentElement;
  if(fsElement()){ (document.exitFullscreen||document.webkitExitFullscreen).call(document); return; }
  const req=el.requestFullscreen||el.webkitRequestFullscreen;
  if(!req){ hintFS(); return; }
  try{ const p=req.call(el); if(p&&p.catch) p.catch(()=>hintFS()); }catch(e){ hintFS(); }
}
let hintTimer=null;
function hintFS(){
  let t=$("#fsHint");
  if(!t){ t=document.createElement("div"); t.id="fsHint"; document.body.appendChild(t); }
  t.textContent="Full screen is blocked here. Open this page in its own browser tab (or your deployed link) to go full screen.";
  t.style.transform="translate(-50%,0)"; clearTimeout(hintTimer);
  hintTimer=setTimeout(()=>{ t.style.transform="translate(-50%,-120%)"; }, 4500);
}
function onFsChange(){
  const on=!!fsElement(), b=$("#fsBtn");
  if(b){ b.innerHTML=on?SVG_COMPRESS:SVG_EXPAND; b.title=on?"Exit full screen (F)":"Full screen (F)"; }
  if(on) requestWake(); else releaseWake();
}
function initFullscreen(){
  $("#fsBtn").onclick=toggleFullscreen;
  document.addEventListener("fullscreenchange", onFsChange);
  document.addEventListener("webkitfullscreenchange", onFsChange);
  document.addEventListener("keydown", e=>{ if((e.key==="f"||e.key==="F") && !/^(input|textarea)$/i.test(e.target.tagName)) toggleFullscreen(); });
  document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible" && fsElement()) requestWake(); });
  onFsChange();
  // Keep kiosk fullscreen across the ‹ board (and other) nav links: remember it
  // when a nav link is clicked while fullscreen (capture phase, before it
  // navigates), then re-enter on the destination page -- immediately where the
  // browser allows (Chrome --kiosk), else on the first tap/key. A manual exit
  // records nothing, so leaving fullscreen on purpose stays windowed.
  document.addEventListener("click", e=>{
    const a = e.target.closest && e.target.closest("header a[href]");
    if(a && fsElement()){ try{ sessionStorage.setItem("kioskFS","1"); }catch(_){} }
  }, true);
  try{ if(sessionStorage.getItem("kioskFS")==="1"){
    sessionStorage.removeItem("kioskFS");
    const tryFS=()=>{ if(fsElement()) return; const el=document.documentElement, req=el.requestFullscreen||el.webkitRequestFullscreen;
      if(req){ try{ const p=req.call(el); if(p&&p.catch) p.catch(()=>{}); }catch(_){} } };
    tryFS();
    const once=()=>{ document.removeEventListener("pointerdown",once,true); document.removeEventListener("keydown",once,true); tryFS(); };
    document.addEventListener("pointerdown", once, true);
    document.addEventListener("keydown", once, true);
  } }catch(_){}
}

function boot(){
  initFullscreen();
  document.documentElement.setAttribute("data-theme", localStorage.getItem("nightmode.theme")||"dark");
  setTheme(localStorage.getItem("nightmode.accent")||"#7db8ff");
  initSettings();
  document.querySelectorAll("#themeSeg button").forEach(b=>b.classList.toggle("active", b.dataset.theme===(localStorage.getItem("nightmode.theme")||"dark")));
  document.querySelectorAll("#skySeg button").forEach(b=>b.classList.toggle("active", b.dataset.sky===(sunSkyEnabled()?"on":"off")));
  makeStars();
  $("#boardBtn").setAttribute("href", CITY_CFG.board);
  $("#boardBtn").title = `Back to the ${CITY_CFG.cityLabel} board`;
  $("#loclbl").textContent = loc.label ? "near "+loc.label : "";
  clock(); setInterval(clock, 1000);
  updateSunSky(); setInterval(updateSunSky, 60000);
  setMode(mode); setInterval(tick, CFG.refreshMs);
  // Only fall back to GPS if the board itself would (i.e. you haven't set a
  // manual address there) -- otherwise this would silently override the
  // address you typed into the board with your device's raw location.
  if(navigator.geolocation && !boardLocIsManual()){
    navigator.geolocation.getCurrentPosition(p=>{
      loc={ lat:p.coords.latitude, lon:p.coords.longitude, label:"your location" };
      $("#loclbl").textContent="near your location"; tick(); updateSunSky();
    }, ()=>{}, { enableHighAccuracy:false, timeout:8000, maximumAge:600000 });
  }
}
// Defensive: if the very first boot() attempt throws (observed occasionally),
// retry shortly after instead of leaving the page stuck uninitialized.
function safeBoot(){ try{ boot(); }catch(e){ console.error("boot() failed, retrying:", e); setTimeout(()=>{ try{ boot(); }catch(e2){ console.error("boot() retry failed:", e2); } }, 150); } }
if(document.readyState === "loading"){ document.addEventListener("DOMContentLoaded", safeBoot); } else { safeBoot(); }
</script>
