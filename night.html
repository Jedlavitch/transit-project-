<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#010409" />
<title>Night Mode — Nearest Flight</title>
<style>
  :root{
    --bg:#010409; --amber:#7db8ff; --amber-dim:#4a7fc4; --muted:#35567e; --faint:#16263c;
    --good:#5ad1a0; --late:#ff6b5a;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--amber);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden;
    display:flex; flex-direction:column; height:100dvh;
    letter-spacing:.5px;
  }
  /* top bar */
  header{display:flex; align-items:center; gap:14px; padding:3.2vmin 4vw 0}
  header .tag{font-size:clamp(.8rem,2.1vw,1.5rem); color:var(--amber-dim); font-weight:700;
    text-transform:uppercase; letter-spacing:.35em}
  header .clock{margin-left:auto; font-size:clamp(1rem,2.6vw,2rem); color:var(--muted);
    font-variant-numeric:tabular-nums}
  header a, header button{color:var(--muted); text-decoration:none; font-size:clamp(.9rem,2.2vw,1.4rem);
    border:1px solid var(--faint); border-radius:10px; padding:.4em .7em; background:none;
    cursor:pointer; display:inline-flex; align-items:center; font-family:inherit}
  header a:hover, header button:hover{color:var(--amber-dim); border-color:var(--amber-dim)}

  main{flex:1; display:flex; flex-direction:column; justify-content:center; gap:2.4vmin;
    padding:2vmin 5vw; min-height:0}

  .dist{font-size:clamp(1rem,3vw,2.2rem); color:var(--amber-dim); font-weight:600}
  .airline{font-size:clamp(2.4rem,8.5vw,8.5rem); font-weight:800; line-height:.98; color:var(--amber)}
  .flight{font-size:clamp(1.3rem,4vw,3.4rem); color:var(--amber-dim); font-weight:700; margin-top:.1em}

  .route{display:flex; align-items:baseline; gap:2.5vw; flex-wrap:wrap; margin-top:1vmin}
  .route .city{font-size:clamp(2rem,7vw,7rem); font-weight:800; line-height:1; color:#dcebff}
  .route .code{font-size:clamp(1rem,2.6vw,2.4rem); color:var(--muted); font-weight:700}
  .route .arrow{font-size:clamp(2rem,6vw,6rem); color:var(--amber-dim); font-weight:400}
  .subcity{font-size:clamp(.95rem,2.4vw,1.9rem); color:var(--muted); font-weight:600; margin-top:.3em}

  .status{display:flex; align-items:center; gap:1.2em; flex-wrap:wrap; margin-top:2vmin;
    font-size:clamp(1.2rem,3.4vw,3rem); font-weight:800}
  .status .phase{color:var(--amber)}
  .status .alt{color:var(--amber-dim); font-weight:700}
  .status .badge{padding:.12em .5em; border-radius:.3em; font-weight:800}
  .status .badge.ok{background:rgba(90,209,122,.14); color:var(--good)}
  .status .badge.late{background:rgba(255,107,90,.15); color:var(--late)}
  .status .badge.na{color:var(--muted); border:1px solid var(--faint)}

  .empty{font-size:clamp(2rem,7vw,6rem); font-weight:800; color:var(--amber-dim); text-align:center}

  /* ---- animated night sky background ---- */
  #sky{position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none}
  #sky .glow{position:absolute; border-radius:50%; filter:blur(70px); opacity:.28;
    animation:drift 30s ease-in-out infinite alternate}
  #sky .g1{width:60vmax;height:60vmax; left:-18vmax; top:-24vmax; background:radial-gradient(circle,#123c78,transparent 65%)}
  #sky .g2{width:48vmax;height:48vmax; right:-14vmax; bottom:-18vmax; background:radial-gradient(circle,#0a2a55,transparent 65%); animation-delay:-11s}
  #sky .g3{width:32vmax;height:32vmax; left:38vw; top:58vh; background:radial-gradient(circle,#0e3c6e,transparent 60%); animation-delay:-20s; opacity:.18}
  @keyframes drift{from{transform:translate3d(0,0,0) scale(1)}to{transform:translate3d(6vmax,3vmax,0) scale(1.12)}}
  .star{position:absolute; border-radius:50%; background:#9ec4ff;
    animation:twinkle var(--tw,4s) ease-in-out var(--td,0s) infinite}
  @keyframes twinkle{0%,100%{opacity:.12}50%{opacity:.85}}

  /* ---- flight-change transition ---- */
  #flight.swap{animation:swapIn .8s cubic-bezier(.2,.7,.2,1)}
  @keyframes swapIn{
    from{opacity:0; transform:translateY(30px) scale(.98); filter:blur(8px)}
    to{opacity:1; transform:none; filter:none}
  }

  /* ---- route progress arc ---- */
  #arcSvg{width:100%; max-width:920px; height:auto; margin-top:1.6vmin; display:none; overflow:visible}
  #arcSvg text{fill:var(--muted); font:700 30px -apple-system,system-ui,sans-serif; letter-spacing:2px}
  #arcSvg .base{stroke:var(--faint); stroke-width:4; fill:none; stroke-dasharray:.012 .012}
  #arcSvg .done{stroke:var(--amber-dim); stroke-width:5; fill:none;
    filter:drop-shadow(0 0 6px rgba(90,150,255,.6)); transition:stroke-dasharray 1.2s ease}
  #arcSvg .endpt{fill:var(--muted)}
  #arcPlane{transition:transform 1.2s ease}
  #arcPlane path{fill:#bcd9ff; filter:drop-shadow(0 0 8px rgba(120,180,255,.9))}

  #flight{display:grid; grid-template-columns:1.5fr 1fr; gap:4vw; align-items:center}
  .photo{margin:0; min-width:0}
  .photo img{width:100%; max-height:56vh; object-fit:cover; border-radius:1.6vmin;
    border:1px solid var(--faint); box-shadow:0 8px 40px rgba(60,130,255,.12); display:block}
  .photo figcaption{margin-top:.5em; text-align:right}
  .photo a{color:var(--muted); font-size:clamp(.7rem,1.6vw,1rem); text-decoration:none}
  @media (max-width:760px), (orientation:portrait){
    #flight{grid-template-columns:1fr; gap:3vmin}
    .photo img{max-height:30vh}
  }

  footer{padding:2vmin 5vw 3vmin; color:var(--faint); font-size:clamp(.8rem,2vw,1.2rem);
    display:flex; gap:1.5em}
  footer b{color:var(--muted)}
  .pulse{animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.72}}
</style>
</head>
<body>
  <div id="sky">
    <div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>
    <div id="stars"></div>
  </div>
  <header>
    <span class="tag">✈ Nearest flight</span>
    <span class="clock" id="clock">—</span>
    <button id="fsBtn" title="Full screen (F)"></button>
    <a href="index.html" title="Back to the board">‹ board</a>
  </header>

  <main id="main">
    <div class="empty pulse" id="loading">Scanning the sky…</div>

    <div id="flight" style="display:none">
      <div class="txt">
        <div class="dist" id="dist"></div>
        <div class="airline" id="airline"></div>
        <div class="flight" id="flightno"></div>
        <div class="route" id="route"></div>
        <div class="subcity" id="subcity"></div>
        <svg id="arcSvg" viewBox="0 0 1000 200" aria-hidden="true">
          <path class="base" id="arcBase" pathLength="1" d=""/>
          <path class="done" id="arcDone" pathLength="1" d=""/>
          <circle class="endpt" id="arcO" r="7"/><circle class="endpt" id="arcD" r="7"/>
          <text id="arcOLbl" text-anchor="start"></text>
          <text id="arcDLbl" text-anchor="end"></text>
          <g id="arcPlane"><path d="M0,-13 L3,-2 L13,3 L13,6 L2,4 L2,10 L6,13 L6,15 L0,13.5 L-6,15 L-6,13 L-2,10 L-2,4 L-13,6 L-13,3 L-3,-2 Z"/></g>
        </svg>
        <div class="status" id="status"></div>
      </div>
      <figure class="photo" id="photoWrap" style="display:none">
        <img id="photo" alt="Photo of this aircraft" />
        <figcaption><a id="photoCredit" target="_blank" rel="noopener"></a></figcaption>
      </figure>
    </div>
  </main>

  <footer>
    <span>overhead within <b id="radlbl">30 nm</b></span>
    <span id="loclbl"></span>
    <span id="updated"></span>
  </footer>

<script>
"use strict";
const CFG = {
  defaultLoc:{ lat:38.9582, lon:-77.1080, label:"Bethesda, MD 20816" },
  radiusNm: 30,
  refreshMs: 12000,
};
let loc = CFG.defaultLoc;
const routeCache = loadRouteCache();

const $ = s=>document.querySelector(s);
function loadRouteCache(){ try{ const c=JSON.parse(localStorage.getItem("nightmode.routes")||"{}"); return c; }catch(e){ return {}; } }
function saveRouteCache(){ try{ localStorage.setItem("nightmode.routes", JSON.stringify(routeCache)); }catch(e){} }

async function getJSON(url, timeout=10000){
  const c=new AbortController(); const t=setTimeout(()=>c.abort(), timeout);
  try{ const r=await fetch(url,{signal:c.signal}); if(!r.ok) throw new Error(r.status); return await r.json(); }
  finally{ clearTimeout(t); }
}
function haversineNm(a,b){
  const R=3440.065, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lon-a.lon)*Math.PI/180;
  const s=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
const COMPASS=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
function bearingFrom(a,b){
  const y=Math.sin((b.lon-a.lon)*Math.PI/180)*Math.cos(b.lat*Math.PI/180);
  const x=Math.cos(a.lat*Math.PI/180)*Math.sin(b.lat*Math.PI/180)-Math.sin(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.cos((b.lon-a.lon)*Math.PI/180);
  return COMPASS[Math.round((Math.atan2(y,x)*180/Math.PI+360)%360/22.5)%16];
}

/* ---- flight route lookup (adsbdb: airline + origin + destination) ---- */
async function lookupRoute(callsign){
  if(!callsign) return null;
  const hit=routeCache[callsign];
  if(hit && Date.now()-hit.t < 216e5) return hit.v;          // cache 6h
  try{
    const d=await getJSON(`https://api.adsbdb.com/v0/callsign/${encodeURIComponent(callsign)}`);
    const fr=d && d.response && d.response.flightroute;
    const v = fr ? { airline:fr.airline, origin:fr.origin, destination:fr.destination } : null;
    routeCache[callsign]={ t:Date.now(), v }; saveRouteCache();
    return v;
  }catch(e){ routeCache[callsign]={ t:Date.now(), v:null }; return null; }
}

/* ---- aircraft photo (planespotters.net public API, by ADS-B hex) ---- */
const photoCache = (function(){ try{ return JSON.parse(localStorage.getItem("nightmode.photos")||"{}"); }catch(e){ return {}; } })();
function savePhotoCache(){ try{ localStorage.setItem("nightmode.photos", JSON.stringify(photoCache)); }catch(e){} }
async function lookupPhoto(hex){
  if(!hex) return null;
  const hit=photoCache[hex];
  if(hit && Date.now()-hit.t < 864e5) return hit.v;            // cache 24h
  let v=null;
  try{
    const d=await getJSON(`https://api.planespotters.net/pub/photos/hex/${encodeURIComponent(hex)}`);
    const p=d && d.photos && d.photos[0];
    if(p) v={ src:(p.thumbnail_large||p.thumbnail||{}).src||"", link:p.link||"", cred:p.photographer||"" };
  }catch(e){}
  photoCache[hex]={ t:Date.now(), v }; savePhotoCache();
  return v;
}
/* ---- route progress arc (origin -> plane -> destination) ---- */
const ARC={P0:[40,160], P1:[500,20], P2:[960,160]};
function arcPoint(t){
  const {P0,P1,P2}=ARC, u=1-t;
  return [u*u*P0[0]+2*u*t*P1[0]+t*t*P2[0], u*u*P0[1]+2*u*t*P1[1]+t*t*P2[1]];
}
function arcAngle(t){
  const {P0,P1,P2}=ARC;
  const dx=2*(1-t)*(P1[0]-P0[0])+2*t*(P2[0]-P1[0]), dy=2*(1-t)*(P1[1]-P0[1])+2*t*(P2[1]-P1[1]);
  return Math.atan2(dy,dx)*180/Math.PI;
}
let arcInit=false;
function renderArc(route, a){
  const svg=$("#arcSvg");
  if(!(route && route.origin && route.destination
      && typeof route.origin.latitude==="number" && typeof route.destination.latitude==="number")){
    svg.style.display="none"; return;
  }
  if(!arcInit){
    const d=`M ${ARC.P0} Q ${ARC.P1} ${ARC.P2}`;
    $("#arcBase").setAttribute("d", d); $("#arcDone").setAttribute("d", d);
    $("#arcO").setAttribute("cx",ARC.P0[0]); $("#arcO").setAttribute("cy",ARC.P0[1]);
    $("#arcD").setAttribute("cx",ARC.P2[0]); $("#arcD").setAttribute("cy",ARC.P2[1]);
    $("#arcOLbl").setAttribute("x",ARC.P0[0]-4); $("#arcOLbl").setAttribute("y",195);
    $("#arcDLbl").setAttribute("x",ARC.P2[0]+4); $("#arcDLbl").setAttribute("y",195);
    arcInit=true;
  }
  const o={lat:route.origin.latitude, lon:route.origin.longitude};
  const d2={lat:route.destination.latitude, lon:route.destination.longitude};
  const p={lat:a.lat, lon:a.lon};
  const flown=haversineNm(o,p), left=haversineNm(p,d2);
  const f=Math.min(.98, Math.max(.02, flown/(flown+left||1)));
  $("#arcDone").style.strokeDasharray=`${f} 1`;
  const [x,y]=arcPoint(f);
  $("#arcPlane").style.transform=`translate(${x}px,${y}px) rotate(${arcAngle(f)+90}deg) scale(1.6)`;
  $("#arcOLbl").textContent=route.origin.iata_code||"";
  $("#arcDLbl").textContent=route.destination.iata_code||"";
  svg.style.display="block";
}

/* twinkling stars */
function makeStars(){
  const holder=$("#stars"); if(!holder || holder.children.length) return;
  for(let i=0;i<110;i++){
    const s=document.createElement("div"); s.className="star";
    const sz=Math.random()<.85?2:3;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;`+
      `--tw:${(2.5+Math.random()*5).toFixed(1)}s;--td:${(-Math.random()*6).toFixed(1)}s;`;
    holder.appendChild(s);
  }
}

let photoShownFor=null;
async function updatePhoto(hex){
  const wrap=$("#photoWrap");
  if(photoShownFor===hex) return;                              // same plane — keep photo
  const v=await lookupPhoto(hex);
  photoShownFor=hex;
  if(v && v.src){
    $("#photo").src=v.src;
    const a=$("#photoCredit"); a.href=v.link||"#"; a.textContent=v.cred?`photo © ${v.cred} · planespotters.net`:"planespotters.net";
    wrap.style.display="";
  } else wrap.style.display="none";
}

/* pick the nearest airborne flight that has a resolvable airline route;
   fall back to the nearest airborne aircraft overall. */
async function pickFlight(planes){
  const air=planes.filter(a=>a.alt_baro!=="ground" && typeof a.lat==="number" && typeof a.lon==="number")
    .map(a=>({a, nm: a.dst!=null? a.dst : haversineNm(loc,{lat:a.lat,lon:a.lon})}))
    .sort((x,y)=>x.nm-y.nm);
  if(!air.length) return null;
  const airliners=air.filter(x=>/^[A-Z]{3}\d/.test((x.a.flight||"").trim())).slice(0,4);
  for(const x of airliners){
    const route=await lookupRoute((x.a.flight||"").trim());
    if(route && route.origin && route.destination) return { ...x, route };
  }
  return { ...air[0], route:null };
}

function phaseOf(a){
  const alt=typeof a.alt_baro==="number"?a.alt_baro:null, rate=a.baro_rate||0;
  if(alt==null) return "en route";
  if(alt<4000 && rate<-150) return "on final approach";
  if(rate<-350) return "descending";
  if(rate>350) return "climbing";
  if(alt>=28000) return "cruising";
  return "en route";
}
function airlineName(route, a){
  if(route && route.airline && route.airline.name) return route.airline.name;
  if(a.ownOp) return a.ownOp;
  const cs=(a.flight||"").trim();
  return cs || a.r || "Unknown aircraft";
}

function render(pick){
  $("#updated").textContent = "updated "+new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  if(!pick){
    $("#loading").style.display=""; $("#loading").textContent="No aircraft overhead"; $("#loading").classList.remove("pulse");
    $("#flight").style.display="none"; return;
  }
  $("#loading").style.display="none";
  const fl=$("#flight"); fl.style.display="";
  const {a, nm, route}=pick;
  if(photoShownFor!==null && photoShownFor!==a.hex){   // a new plane became nearest
    fl.classList.remove("swap"); void fl.offsetWidth; fl.classList.add("swap");
  }
  updatePhoto(a.hex);
  renderArc(route, a);
  const dir=bearingFrom(loc,{lat:a.lat,lon:a.lon});
  $("#dist").textContent = `${nm.toFixed(1)} nm ${dir}${typeof a.alt_baro==="number"?` · ${a.alt_baro.toLocaleString()} ft`:""}`;
  $("#airline").textContent = airlineName(route, a);
  const cs=(a.flight||"").trim();
  $("#flightno").textContent = [cs, a.desc||a.t].filter(Boolean).join("  ·  ");

  const routeEl=$("#route"), subEl=$("#subcity");
  if(route && route.origin && route.destination){
    const o=route.origin, d=route.destination;
    routeEl.innerHTML =
      `<span class="city">${escapeHtml(o.municipality||o.iata_code||"?")}</span>`+
      `<span class="arrow">→</span>`+
      `<span class="city">${escapeHtml(d.municipality||d.iata_code||"?")}</span>`;
    subEl.textContent = `${o.iata_code||""} ${o.name||""}  →  ${d.iata_code||""} ${d.name||""}`.trim();
    routeEl.style.display=""; subEl.style.display="";
  } else {
    routeEl.style.display="none";
    subEl.textContent = a.ownOp ? a.ownOp : "General aviation — no scheduled route";
    subEl.style.display="";
  }

  // Status: live flight phase + estimated arrival (distance to destination ÷ ground speed).
  // This is a live estimate, not an airline's official on-time/late (that needs a paid API).
  const spd = a.gs ? `${Math.round(a.gs)} kt` : "";
  let etaHtml = `<span class="badge na">en route</span>`;
  if(route && route.destination && typeof route.destination.latitude==="number" && a.gs>40){
    const dNm=haversineNm({lat:a.lat,lon:a.lon},{lat:route.destination.latitude,lon:route.destination.longitude});
    const mins=Math.round(dNm/a.gs*60);
    if(mins>=0 && mins<24*60){
      const arr=new Date(Date.now()+mins*60000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      etaHtml = mins<=1 ? `<span class="badge ok">landing now</span>`
        : `<span class="badge ok">≈ ${mins} min · arr ${arr}</span>`;
    }
  }
  $("#status").innerHTML =
    `<span class="phase">${phaseOf(a)}</span>`+
    (spd?`<span class="alt">${spd}</span>`:"")+ etaHtml;
}
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function tick(){
  try{
    const data=await getJSON(`https://api.airplanes.live/v2/point/${loc.lat.toFixed(4)}/${loc.lon.toFixed(4)}/${CFG.radiusNm}`);
    const pick=await pickFlight(data.ac||[]);
    render(pick);
  }catch(e){ /* keep last render */ }
}
function clock(){ $("#clock").textContent=new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); }

/* ---- full-screen kiosk mode + keep-awake ---- */
const SVG_EXPAND=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m8 0h3a2 2 0 0 0 2-2v-3"/></svg>`;
const SVG_COMPRESS=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3m8 0v-3a2 2 0 0 1 2-2h3"/></svg>`;
let wakeLock=null;
async function requestWake(){ try{ if("wakeLock" in navigator) wakeLock=await navigator.wakeLock.request("screen"); }catch(e){} }
async function releaseWake(){ try{ if(wakeLock) await wakeLock.release(); }catch(e){} wakeLock=null; }
function fsElement(){ return document.fullscreenElement || document.webkitFullscreenElement; }
function toggleFullscreen(){
  const el=document.documentElement;
  if(fsElement()){ (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
  else { const req=el.requestFullscreen||el.webkitRequestFullscreen; if(req){ const p=req.call(el); if(p&&p.catch) p.catch(()=>{}); } }
}
function onFsChange(){
  const on=!!fsElement(), b=$("#fsBtn");
  if(b){ b.innerHTML=on?SVG_COMPRESS:SVG_EXPAND; b.title=on?"Exit full screen (F)":"Full screen (F)"; }
  if(on) requestWake(); else releaseWake();
}
function initFullscreen(){
  $("#fsBtn").onclick=toggleFullscreen;
  document.addEventListener("fullscreenchange", onFsChange);
  document.addEventListener("webkitfullscreenchange", onFsChange);
  document.addEventListener("keydown", e=>{ if((e.key==="f"||e.key==="F") && !/^(input|textarea)$/i.test(e.target.tagName)) toggleFullscreen(); });
  document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible" && fsElement()) requestWake(); });
  onFsChange();
}

function boot(){
  initFullscreen();
  makeStars();
  $("#radlbl").textContent = CFG.radiusNm+" nm";
  $("#loclbl").textContent = loc.label ? "near "+loc.label : "";
  clock(); setInterval(clock, 1000);
  tick(); setInterval(tick, CFG.refreshMs);
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(p=>{
      loc={ lat:p.coords.latitude, lon:p.coords.longitude, label:"your location" };
      $("#loclbl").textContent="near your location"; tick();
    }, ()=>{}, { enableHighAccuracy:false, timeout:8000, maximumAge:600000 });
  }
}
document.addEventListener("DOMContentLoaded", boot);
</script>
</body>
</html>
